<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReusableAI</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>ReusableAI</h1>
          <p>Chat your way from requirements to downloadable project ZIP.</p>
        </div>
        <div class="phase-wrap">
          <span class="phase-label">Current Phase</span>
          <span id="phaseBadge" class="phase-badge phase-gather">Gather</span>
        </div>
      </header>

      <section class="workspace">
        <div class="project-row">
          <label for="projectName">Project Name</label>
          <input id="projectName" type="text" placeholder="my-api" value="my-api" />
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="composer">
          <textarea id="prompt" rows="3" placeholder="Describe your app, features, and constraints..."></textarea>
          <button id="sendBtn">Send</button>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
