version: "3.9"
services:
  backend:
    build: ./backend
    env_file: [.env]
    ports: ["8003:8000"]
  frontend:
    build: ./frontend
    env_file: [.env]
    ports: ["5173:5173"]
  gateway:
    image: nginx:1.27-alpine
    ports: ["8080:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [backend, frontend]
